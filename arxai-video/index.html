<!doctype html>
<html lang="en" data-resolution="landscape">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=1920, height=1080"/>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:1920px; height:1080px; overflow:hidden; background:#000;
      font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif; }

    #root { position:absolute; top:0; left:0; width:1920px; height:1080px; }

    canvas { position:absolute; top:0; left:0; width:1920px; height:1080px; }
    #bgCanvas { z-index:1; }
    #fxCanvas { z-index:5; pointer-events:none; }

    /* Rings — no CSS transform; GSAP handles xPercent/yPercent */
    .ring {
      position:absolute; border-radius:50%;
      border:1.5px solid rgba(0,200,255,0.16);
      left:50%; top:50%; opacity:0; z-index:2;
    }
    #ring2 { border-color:rgba(110,60,255,0.12); }
    #ring3 { border-color:rgba(0,200,255,0.07); }

    /* Logo — no CSS transform */
    #logoRow {
      position:absolute; left:50%; top:340px;
      display:flex; align-items:center; gap:24px;
      opacity:0; z-index:3;
    }
    .hex-icon { width:88px; height:88px; flex-shrink:0; }
    .brand {
      font-size:108px; font-weight:900; letter-spacing:14px; text-transform:uppercase; line-height:1;
      background:linear-gradient(120deg,#fff 0%,#00d4ff 45%,#8b5cf6 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      filter:drop-shadow(0 0 50px rgba(0,212,255,.55));
    }

    /* Divider */
    #divider {
      position:absolute; left:50%; top:512px;
      height:2px; width:0; opacity:0; z-index:3;
      background:linear-gradient(90deg,transparent,#00d4ff,#8b5cf6,transparent);
    }

    /* Tagline */
    #tagline {
      position:absolute; left:50%; top:548px;
      font-size:26px; letter-spacing:22px; text-transform:uppercase;
      color:rgba(255,255,255,0); font-weight:400; white-space:nowrap;
      opacity:0; z-index:3;
    }
    #tagline .accent { color:#00d4ff; font-weight:700; }

    /* Waveform */
    #waveform {
      position:absolute; left:50%; top:628px;
      display:flex; align-items:flex-end; gap:7px; height:80px;
      opacity:0; z-index:3;
    }
    .bar {
      width:5px; border-radius:5px; height:8px;
      background:linear-gradient(180deg,#00d4ff,#8b5cf6);
      box-shadow:0 0 10px rgba(0,212,255,.5);
    }

    /* Pills wrapper (not a clip — individual pills are clips) */
    #pillsWrap {
      position:absolute; left:50%; top:756px;
      display:flex; gap:20px; z-index:3;
    }
    .pill {
      padding:12px 30px; border-radius:100px; font-size:14px; font-weight:600;
      letter-spacing:3px; text-transform:uppercase;
      border:1px solid rgba(0,212,255,.35);
      background:rgba(0,212,255,.07); color:rgba(255,255,255,.8);
      opacity:0; white-space:nowrap;
    }

    /* Badge */
    #badge {
      position:absolute; left:50%; top:848px;
      display:flex; align-items:center; gap:12px;
      padding:13px 34px; border-radius:100px;
      border:1px solid rgba(0,212,255,.3); background:rgba(0,212,255,.05);
      opacity:0; z-index:3; white-space:nowrap;
    }
    .dot { width:10px; height:10px; border-radius:50%; background:#00d4ff; box-shadow:0 0 14px #00d4ff; }
    .badge-txt { font-size:14px; letter-spacing:3.5px; text-transform:uppercase; color:rgba(255,255,255,.65); }

    /* URL */
    #urlTag {
      position:absolute; left:50%; top:1010px;
      font-size:16px; letter-spacing:5px; text-transform:uppercase;
      color:rgba(255,255,255,.25); opacity:0; z-index:3; white-space:nowrap;
    }

    /* Vignette */
    #vignette {
      position:absolute; top:0; left:0; width:1920px; height:1080px; z-index:6; pointer-events:none;
      background:radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(0,0,0,.65) 100%);
    }

    /* Outro */
    #outro {
      position:absolute; top:0; left:0; width:1920px; height:1080px;
      background:#000; opacity:0; z-index:20; pointer-events:none;
    }
  </style>
</head>
<body>
<div id="root"
     data-composition-id="main"
     data-start="0"
     data-duration="8"
     data-width="1920"
     data-height="1080">

  <canvas id="bgCanvas" width="1920" height="1080"></canvas>

  <!-- Rings: unique tracks 2,3,4 -->
  <div class="ring clip" id="ring1" data-start="0.3" data-duration="7.7" data-track-index="2"
       style="width:500px;height:500px;"></div>
  <div class="ring clip" id="ring2" data-start="0.3" data-duration="7.7" data-track-index="3"
       style="width:680px;height:680px;"></div>
  <div class="ring clip" id="ring3" data-start="0.3" data-duration="7.7" data-track-index="4"
       style="width:860px;height:860px;"></div>

  <!-- Logo: track 5 -->
  <div class="clip" id="logoRow" data-start="0.4" data-duration="7.6" data-track-index="5">
    <svg class="hex-icon" viewBox="0 0 88 88" fill="none">
      <polygon points="44,5 79,23 79,65 44,83 9,65 9,23"
        stroke="url(#hg)" stroke-width="2" fill="none"/>
      <path d="M27 56 L44 27 L61 56" stroke="url(#hg)" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="33" y1="45" x2="55" y2="45" stroke="url(#hg)" stroke-width="3" stroke-linecap="round"/>
      <circle cx="44" cy="27" r="4.5" fill="#00d4ff"/>
      <defs>
        <linearGradient id="hg" x1="9" y1="5" x2="79" y2="83" gradientUnits="userSpaceOnUse">
          <stop stop-color="#00d4ff"/>
          <stop offset="1" stop-color="#8b5cf6"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="brand">ARX AI</div>
  </div>

  <!-- Divider: track 6 -->
  <div class="clip" id="divider" data-start="1.2" data-duration="6.8" data-track-index="6"></div>

  <!-- Tagline: track 7 -->
  <div class="clip" id="tagline" data-start="1.9" data-duration="6.1" data-track-index="7">
    <span class="accent">24/7</span>&nbsp; AI Voice Agents for Your Business
  </div>

  <!-- Waveform: track 8 -->
  <div class="clip" id="waveform" data-start="2.7" data-duration="5.3" data-track-index="8"></div>

  <!-- Pills wrapper (not a clip) + individual pill clips on unique tracks -->
  <div id="pillsWrap">
    <div class="pill clip" id="pill1" data-start="3.8"  data-duration="4.2" data-track-index="9">Voice AI</div>
    <div class="pill clip" id="pill2" data-start="3.95" data-duration="4.05" data-track-index="10">24/7 Availability</div>
    <div class="pill clip" id="pill3" data-start="4.1"  data-duration="3.9" data-track-index="11">Business Automation</div>
    <div class="pill clip" id="pill4" data-start="4.25" data-duration="3.75" data-track-index="12">Always Intelligent</div>
  </div>

  <!-- Badge: track 13 -->
  <div class="clip" id="badge" data-start="4.8" data-duration="3.2" data-track-index="13">
    <div class="dot"></div>
    <div class="badge-txt">Live &nbsp;·&nbsp; Autonomous &nbsp;·&nbsp; Scalable</div>
  </div>

  <!-- URL: track 14 -->
  <div class="clip" id="urlTag" data-start="5.6" data-duration="2.4" data-track-index="14">arxai.us</div>

  <!-- Vignette (always on, no clip) -->
  <div id="vignette"></div>

  <!-- Outro: track 15 -->
  <div class="clip" id="outro" data-start="7.3" data-duration="0.7" data-track-index="15"></div>

  <canvas id="fxCanvas" width="1920" height="1080"></canvas>

</div><!-- /#root -->

<script>
// ── Deterministic neural network background ──────────────────────────────────
const bgC = document.getElementById('bgCanvas');
const bgX = bgC.getContext('2d');
const fxC = document.getElementById('fxCanvas');
const fxX = fxC.getContext('2d');
const W = 1920, H = 1080;

const RAW = [
  [120,80,0.32,-0.28],[310,190,0.28,0.35],[520,60,0.38,-0.31],[700,240,0.25,0.42],
  [890,130,-0.35,0.29],[1050,310,0.41,-0.26],[1200,80,0.27,0.38],[1380,220,-0.29,0.33],
  [1560,90,0.34,-0.37],[1740,280,-0.38,0.24],[1850,150,0.26,0.41],[80,380,-0.31,0.27],
  [230,480,0.43,0.22],[440,350,-0.27,0.39],[620,520,0.36,-0.25],[800,400,-0.33,0.43],
  [980,460,0.29,0.37],[1140,380,-0.41,0.26],[1320,500,0.35,-0.34],[1500,420,-0.28,0.45],
  [1680,360,0.42,-0.28],[1870,480,-0.31,0.32],[50,650,0.38,0.27],[180,720,-0.26,0.41],
  [370,600,0.32,-0.35],[560,750,-0.43,0.28],[740,640,0.27,0.39],[920,700,-0.35,-0.26],
  [1100,620,0.41,0.31],[1260,760,-0.29,0.37],[1450,660,0.33,-0.43],[1640,740,-0.38,0.25],
  [1800,620,0.26,0.44],[100,870,0.39,-0.27],[280,940,-0.27,0.38],[480,820,0.35,0.29],
  [660,980,-0.41,0.26],[860,880,0.28,-0.39],[1040,960,-0.33,0.42],[1220,840,0.44,-0.28],
  [1400,980,-0.26,0.35],[1600,860,0.31,0.42],[1780,940,-0.37,-0.29],[960,540,0.23,-0.41],
  [480,270,0.37,0.26],[1440,270,-0.32,0.38],[240,810,-0.39,0.24],[1680,810,0.26,0.41],
  [350,130,0.44,-0.26],[1570,130,-0.28,0.39],[1100,950,-0.35,0.27],[820,950,0.32,-0.42],
  [140,270,0.38,-0.32],[1780,270,-0.26,0.41],[140,810,-0.42,0.27],[1780,810,0.29,-0.38],
  [600,160,0.35,0.24],[1320,160,-0.31,0.43],[600,920,-0.38,-0.26],[1320,920,0.26,0.37],
  [480,540,0.34,-0.41],[1440,540,-0.28,0.26],[200,1020,0.42,0.31],[1720,1020,-0.35,-0.27],
  [1080,430,0.28,0.44],[840,650,-0.39,0.26],[1160,650,0.33,-0.37],[1920,540,0.27,0.35],
  [680,1060,-0.29,-0.37],[1240,1060,0.38,0.25],[960,20,0.26,0.43],[350,540,-0.27,-0.39],
];
const nodes = RAW.map(([x,y,vx,vy]) => ({x,y,vx,vy}));
const DIST = 180;

// Background driven by GSAP ticker (syncs with capture engine)
function drawBg(gsapTime) {
  const t = gsapTime * 1000;
  bgX.clearRect(0,0,W,H);

  const pulse = 0.13 + Math.sin(t * 0.0012) * 0.04;
  const grd = bgX.createRadialGradient(960,540,0, 960,540,620);
  grd.addColorStop(0,   `rgba(0,80,130,${pulse})`);
  grd.addColorStop(0.5, `rgba(70,20,140,${pulse * 0.5})`);
  grd.addColorStop(1,   'rgba(0,0,0,0)');
  bgX.fillStyle = grd;
  bgX.fillRect(0,0,W,H);

  nodes.forEach(n => {
    n.x += n.vx; n.y += n.vy;
    if(n.x < 0 || n.x > W) n.vx *= -1;
    if(n.y < 0 || n.y > H) n.vy *= -1;
  });
  for(let i=0; i<nodes.length; i++) {
    for(let j=i+1; j<nodes.length; j++) {
      const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<DIST){
        bgX.beginPath();
        bgX.moveTo(nodes[i].x,nodes[i].y);
        bgX.lineTo(nodes[j].x,nodes[j].y);
        bgX.strokeStyle=`rgba(0,200,255,${(1-d/DIST)*0.2})`;
        bgX.lineWidth=0.9;
        bgX.stroke();
      }
    }
  }
  nodes.forEach(n=>{
    bgX.beginPath(); bgX.arc(n.x,n.y,1.2,0,Math.PI*2);
    bgX.fillStyle='rgba(0,210,255,.6)'; bgX.fill();
  });

  // Vignette on fx canvas
  fxX.clearRect(0,0,W,H);
  const vig=fxX.createRadialGradient(960,540,300,960,540,1100);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,0.72)');
  fxX.fillStyle=vig; fxX.fillRect(0,0,W,H);
}

// ── Build waveform bars ───────────────────────────────────────────────────────
const HEIGHTS = [10,16,26,40,60,52,44,66,56,40,66,52,40,26,14,
                 10,16,26,40,60,52,44,66,56,40,66,52,40,26,14];
const wf = document.getElementById('waveform');
HEIGHTS.forEach(h => {
  const b = document.createElement('div');
  b.className = 'bar';
  wf.appendChild(b);
});

// ── GSAP Timeline ─────────────────────────────────────────────────────────────
window.__timelines = window.__timelines || {};
const tl = gsap.timeline({ paused: true });

// Background driven via onUpdate on a spanning tween
tl.fromTo({}, { v:0 }, { v:1, duration:8,
  onUpdate: function() { drawBg(tl.time()); }
}, 0);

// Rings — xPercent/yPercent for centering, finite repeat
// ring1: dur=1.8, repeat=3, yoyo → total=7.2s from t=0.3 → ends 7.5s ✓
tl.fromTo('#ring1',
  { xPercent:-50, yPercent:-50, opacity:0, scale:0.95 },
  { xPercent:-50, yPercent:-50, opacity:1, scale:1,    duration:0.6, ease:'power2.out' }, 0.3);
tl.to('#ring1', { scale:1.04, duration:1.8, ease:'sine.inOut', repeat:3, yoyo:true, transformOrigin:'50% 50%' }, 0.9);

tl.fromTo('#ring2',
  { xPercent:-50, yPercent:-50, opacity:0, scale:0.95 },
  { xPercent:-50, yPercent:-50, opacity:1, scale:1,    duration:0.6, ease:'power2.out' }, 0.3);
tl.to('#ring2', { scale:1.04, duration:1.8, ease:'sine.inOut', repeat:3, yoyo:true, delay:0.35, transformOrigin:'50% 50%' }, 0.9);

tl.fromTo('#ring3',
  { xPercent:-50, yPercent:-50, opacity:0, scale:0.95 },
  { xPercent:-50, yPercent:-50, opacity:1, scale:1,    duration:0.6, ease:'power2.out' }, 0.3);
tl.to('#ring3', { scale:1.04, duration:1.8, ease:'sine.inOut', repeat:3, yoyo:true, delay:0.7, transformOrigin:'50% 50%' }, 0.9);

// Logo slam in — xPercent for centering, animate y/scale/opacity
tl.fromTo('#logoRow',
  { xPercent:-50, opacity:0, y:28, scale:0.72, filter:'blur(14px)' },
  { xPercent:-50, opacity:1, y:0,  scale:1,    filter:'blur(0px)', duration:0.65, ease:'back.out(1.4)' }, 0.4);

// Divider sweep — xPercent keeps it centered as width grows
tl.fromTo('#divider',
  { xPercent:-50, opacity:0, width:'0px' },
  { xPercent:-50, opacity:1, width:'700px', duration:0.55, ease:'power2.out' }, 1.2);

// Tagline — letter-spacing contract + fade
tl.fromTo('#tagline',
  { xPercent:-50, opacity:0, letterSpacing:'22px', color:'rgba(255,255,255,0)' },
  { xPercent:-50, opacity:1, letterSpacing:'7px',  color:'rgba(255,255,255,0.8)', duration:0.75, ease:'power2.out' }, 1.9);

// Waveform rise
tl.fromTo('#waveform',
  { xPercent:-50, opacity:0, y:18 },
  { xPercent:-50, opacity:1, y:0,  duration:0.4, ease:'power2.out' }, 2.7);

// Bars animate — finite repeat:4, yoyo. dur range 0.55–0.87
const bars = wf.querySelectorAll('.bar');
const BASE_DURS = [0.65,0.72,0.58,0.80,0.55,0.75,0.62,0.87,0.68,0.56,
                   0.84,0.71,0.60,0.78,0.65,0.65,0.72,0.58,0.80,0.55,
                   0.75,0.62,0.87,0.68,0.56,0.84,0.71,0.60,0.78,0.65];
bars.forEach((bar, i) => {
  const d   = BASE_DURS[i];
  const del = 2.75 + (i % 8) * 0.045;
  tl.fromTo(bar,
    { height:'8px' },
    { height: HEIGHTS[i] + 'px', duration: d, ease:'sine.inOut',
      repeat: 4, yoyo: true },
    del
  );
});

// Pills — xPercent for pillsWrap centering (applied once), pills animate from y
tl.fromTo('#pillsWrap',
  { xPercent:-50 }, { xPercent:-50, duration:0.01 }, 3.79);

[['#pill1',3.80],['#pill2',3.95],['#pill3',4.10],['#pill4',4.25]].forEach(([id,t]) => {
  tl.fromTo(id,
    { opacity:0, y:22 },
    { opacity:1, y:0, duration:0.45, ease:'back.out(1.6)' }, t);
});

// Badge
tl.fromTo('#badge',
  { xPercent:-50, opacity:0, y:16 },
  { xPercent:-50, opacity:1, y:0,  duration:0.45, ease:'power2.out' }, 4.8);

// Dot blink — repeat:3 finite. dur=0.65, total=2.6s from t=5 → ends 7.6s ✓
tl.to('.dot', { opacity:0.15, duration:0.65, ease:'sine.inOut', repeat:3, yoyo:true }, 5.1);

// URL fade
tl.fromTo('#urlTag',
  { xPercent:-50, opacity:0, y:12 },
  { xPercent:-50, opacity:1, y:0,  duration:0.4, ease:'power2.out' }, 5.6);

// Outro fade to black
tl.fromTo('#outro',
  { opacity:0 },
  { opacity:1, duration:0.7, ease:'power1.in' }, 7.3);

window.__timelines["main"] = tl;
</script>
</body>
</html>
